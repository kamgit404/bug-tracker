version: "1"
projects:
- name: Bugtracker-Kamui
  environments:
  - name: Production
    services:
    - type: web
      name: bugtracker-backend-kamui
      runtime: go
      repo: https://github.com/kamui-git/bug-tracker
      plan: free
      envVars:
      - fromGroup: bugtracker-production-env
      region: singapore
      buildCommand: go build -tags netgo -ldflags '-s -w' -o app ./cmd/server
      startCommand: ./app
      healthCheckPath: /api/health
      autoDeployTrigger: checksPass
      rootDir: ./bugtracker-backend
