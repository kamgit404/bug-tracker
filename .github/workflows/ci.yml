name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
    unit-tests-backend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5 # Check out the repository

            - name: Set up Go
              uses: actions/setup-go@v6 # Github special actions to help install Go onto Github runner instance
              with:
                go-version: '1.21' # Specify the Go version
                cache-dependency-path: ./bugtracker-backend/go.sum # Cache the files so that it is reused in subsequent runs
            
            - name: Install go-junit-report
              run: go install github.com/jstemmer/go-junit-report/v2@latest

            - name: Run Backend Unit Tests
              working-directory: ./bugtracker-backend
              run: |
                # Run tests and produce test result report
                go test -v ./... 2>&1 | go-junit-report > test-results.xml

            - name: Publish Backend Test Report
              uses: dorny/test-reporter@v3
              if: always()
              with:
                name: Backend Unit Tests Report
                path: ./bugtracker-backend/test-results.xml
                reporter: jest-junit

    unit-tests-frontend:
        needs: unit-tests-backend
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                node-version: '24' 
                cache: 'npm'
                cache-dependency-path: ./bugtracker-frontend/package-lock.json
                
            - name: Run Frontend Unit Tests
              working-directory: ./bugtracker-frontend
              run: |
                npm ci
                npm test

            - name: Publish Frontend Unit Test Report
              uses: dorny/test-reporter@v3
              if: always()
              with:
                name: Frontend Unit Tests Report
                path: ./bugtracker-frontend/test-results.xml
                reporter: jest-junit
