name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
    unit-tests-backend:
        runs-on: ubuntu-latest
        defaults:
          run:
            working-directory: bugtracker-backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        outputs:
            coverage: ${{ steps.coverage-report-backend.outputs.report }}
        steps:
            - uses: actions/checkout@v5 # Check out the repository

            - name: Set up Go
              uses: actions/setup-go@v6 # Github special actions to help install Go onto Github runner instance
              with:
                go-version: '1.25' # Specify the Go version
                cache-dependency-path: ./bugtracker-backend/go.sum # Cache the files so that it is reused in subsequent runs
            
            - name: Install go-junit-report
              run: go install github.com/jstemmer/go-junit-report/v2@latest

            - name: Backend Code Coverage Report
              id: coverage-report-backend
              run: |

                go test -json -coverprofile=coverage.out -covermode=atomic ./...
                go tool cover -func=coverage.out > coverage.txt

                # Displays the coverage report directly on the GitHub Actions workflow page
                echo "## 📊 Backend Test Coverage Report" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                cat coverage.txt >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY

                # Save coverage report as an output to be used to create PR comment
                echo 'report<<EOF' >> $GITHUB_OUTPUT
                cat coverage.txt >> $GITHUB_OUTPUT
                echo 'EOF' >> $GITHUB_OUTPUT

            - name: Run Backend Unit Tests
              run: |

                go test -v ./... 2>&1 | go-junit-report > test-results.xml

            - name: Publish Backend Unit Tests Result
              uses: dorny/test-reporter@v1
              if: always()
              with:
                name: Backend Unit Tests Result
                path: ./bugtracker-backend/test-results.xml
                reporter: jest-junit

    unit-tests-frontend:
        runs-on: ubuntu-latest
        outputs:
            coverage: ${{ steps.run-tests-frontend.outputs.report }}
        steps:
            - uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                node-version: '24' 
                cache: 'npm'
                cache-dependency-path: ./bugtracker-frontend/package-lock.json
                
            - name: Run Frontend Unit Tests
              id: run-tests-frontend
              working-directory: ./bugtracker-frontend
              run: |

                npm ci
                npm test | tee full_output.txt
                
                echo '## 📊 Frontend Test Coverage Report' >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                cat full_output.txt >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY

                # Save coverage report as an output to be used to create PR comment
                echo 'report<<EOF' >> $GITHUB_OUTPUT
                cat full_output.txt >> $GITHUB_OUTPUT
                echo 'EOF' >> $GITHUB_OUTPUT

            - name: Publish Frontend Unit Tests Result
              uses: dorny/test-reporter@v1
              if: always()
              with:
                name: Frontend Unit Tests Result
                path: ./bugtracker-frontend/test-results.xml
                reporter: jest-junit

    create-coverage-comment:
      if: github.event_name == 'pull_request'
      needs: [unit-tests-backend, unit-tests-frontend]
      runs-on: ubuntu-latest
      permissions:
        pull-requests: write
      steps:
        - name: Create Backend Coverage Comment
          uses: peter-evans/create-or-update-comment@v4
          with:
            issue-number: ${{ github.event.pull_request.number }}
            body: |
              ## 📊 Backend Test Coverage Report
              ```
              ${{ needs.unit-tests-backend.outputs.coverage }}
              ```
        - name: Create Frontend Coverage Comment
          uses: peter-evans/create-or-update-comment@v4
          with:
            issue-number: ${{ github.event.pull_request.number }}
            body: |
              ## 📊 Frontend Test Coverage Report
              ```
              ${{ needs.unit-tests-frontend.outputs.coverage }}
              ``` 

    api-e2e-tests:
        needs: [unit-tests-backend, unit-tests-frontend]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - name: Launch App
              env:
                TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
              run: |
                docker compose up --build -d \
                  -e DATABASE_URL="$TEST_DATABASE_URL"
                sleep 5
                docker compose logs bugtracker-backend
                npx wait-port http://localhost:8080/api/health -t 30000
            
            - name: Debug - Show container logs on failure
              if: failure()
              run: docker compose logs

            - name: Run API Tests
              working-directory: ./tests-api
              run: npm ci && npx playwright test

            - name: Run E2E Tests
              working-directory: ./tests-e2e
              run: |
                npm ci
                npx playwright install
                npx playwright test

            - name: Tear down App
              run: docker compose down

            - name: Upload API Test Results
              if: always()
              uses: actions/upload-artifact@v6
              with:
                name: api-test-results
                path: ./tests-api/test-results/
                retention-days: 30

            - name: Upload API Test Playwright Report
              if: always()
              uses: actions/upload-artifact@v6
              with:
                name: api-test-playwright-report
                path: ./tests-api/playwright-report/
                retention-days: 30

            - name: Upload E2E Test Results
              if: always()
              uses: actions/upload-artifact@v6
              with:
                name: e2e-test-results
                path: ./tests-e2e/test-results/
                retention-days: 30

            - name: Upload E2E Test Playwright Report
              if: always()
              uses: actions/upload-artifact@v6
              with:
                name: e2e-test-playwright-report
                path: ./tests-e2e/playwright-report/
                retention-days: 30

            - name: Publish API Test Results
              uses: dorny/test-reporter@v1
              if: always()
              with:
                name: Playwright API Test Results
                path: ./tests-api/test-results/*.xml
                reporter: jest-junit
            
            - name: Publish E2E Test Results
              uses: dorny/test-reporter@v1
              if: always()
              with:
                name: Playwright E2E Test Results
                path: ./tests-e2e/test-results/*.xml
                reporter: jest-junit

    performance-tests:
        needs: [api-e2e-tests]
        permissions:
          pages: write
          id-token: write
          contents: read
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v5

            - name: Launch App
              run: |
                docker compose up --build -d
                npx wait-port http://localhost:8080/api/health -t 30000

            - name: Set up k6
              uses: grafana/setup-k6-action@v1
            
            - name: Run Performance tests
              uses: grafana/run-k6-action@v1
              with:
                path: ./tests-perf/script.js
                flags: --out json=summary.json
            
            - name: Prepare Pages site
              if: always()
              run: |
                mkdir -p site
                cp perf-results.html site/index.html
            
            - name: Upload Performance Raw Results
              if: always()
              uses: actions/upload-artifact@v6
              with:
                name: performance-test-raw-results
                path: summary.json
              
            - name: Upload Performance Test Report
              if: always()
              uses: actions/upload-artifact@v6
              with:
                name: performance-test-report
                path: perf-results.html

            - name: Upload Pages artifact
              if: always()
              uses: actions/upload-pages-artifact@v3
              with:
                path: ./site
    
    deploy-performance-report:
        needs: performance-tests
        permissions:
          pages: write
          id-token: write
        runs-on: ubuntu-latest
        environment:
          name: github-pages
          url: ${{ steps.publish-report.outputs.page_url }}

        steps:
          - name: Deploy report to GitHub Pages
            id: publish-report
            uses: actions/deploy-pages@v4